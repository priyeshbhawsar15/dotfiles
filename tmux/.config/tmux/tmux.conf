unbind r
bind r source-file ~/.config/tmux/tmux.conf

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

if-shell 'test -d /home/linuxbrew/.linuxbrew/bin' {
  set-environment -gF PATH "/home/linuxbrew/.linuxbrew/bin:/home/linuxbrew/.linuxbrew/sbin:#{PATH}"
}
if-shell 'test -d "$HOME/.linuxbrew/bin"' {
  set-environment -gF PATH "#{HOME}/.linuxbrew/bin:#{HOME}/.linuxbrew/sbin:#{PATH}"
}
if-shell 'test -d /opt/homebrew/bin' {
  set-environment -gF PATH "/opt/homebrew/bin:/opt/homebrew/sbin:#{PATH}"
}

#set -g prefix C-s
#unbind C-b
set -g prefix M-w
set -g mouse on
set-option -g default-shell /bin/zsh

set-window-option -g mode-keys vi

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# configure Tmux Plugin Manager
set-environment -gF TMUX_PLUGIN_MANAGER_PATH '#{HOME}/.local/share/tmux/plugins'

if 'test ! -d "${TMUX_PLUGIN_MANAGER_PATH}/tpm"' {
  run 'mkdir -p "${TMUX_PLUGIN_MANAGER_PATH}"'
  run 'git clone https://github.com/tmux-plugins/tpm "${TMUX_PLUGIN_MANAGER_PATH}/tpm"'
  run '${TMUX_PLUGIN_MANAGER_PATH}/tpm/bin/install_plugins'
}
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'
set -g @plugin 'alexwforsythe/tmux-which-key'  # prefix + space
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'dreknix/tmux-primary-ip'
if-shell 'command -v yq >/dev/null 2>&1' {
  set -g @plugin 'omerxx/tmux-sessionx'
} {
  display-message 'tmux-sessionx disabled: yq not found'
}

### https://github.com/catppuccin/tmux
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_number_position 'right'
set -g @catppuccin_window_status 'no'
set -g @catppuccin_window_default_text '#W'
set -g @catppuccin_window_current_fill 'number'
set -g @catppuccin_window_current_text '#W'
set -g @catppuccin_window_current_color '#{E:@thm_surface_2}'
set -g @catppuccin_date_time_text '%d.%m. %H:%M'
set -g @catppuccin_status_module_text_bg '#{E:@thm_mantle}'
if 'test -r "${TMUX_PLUGIN_MANAGER_PATH}/tmux/catppuccin.tmux"' {
  run '#{TMUX_PLUGIN_MANAGER_PATH}/tmux/catppuccin.tmux'
}

#session presistance
set -g @resurrect-hook-post-save-all 'eval $(xdotool getwindowgeometry --shell $WINDOWID); echo 0,$X,$Y,$WIDTH,$HEIGHT > $HOME/.tmux/resurrect/geometry'
set -g @resurrect-hook-pre-restore-all 'wmctrl -i -r $WINDOWID -e $(cat $HOME/.tmux/resurrect/geometry)'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-processes 'npm "npm run dev"'

# set left and right status bar
set -g allow-rename on
set -g status-position top
set -g status-interval 5
set -g status-left-length 100
set -g status-right-length 1000

if 'test -r "${TMUX_PLUGIN_MANAGER_PATH}/tmux/utils/status_module.conf"' {
  # load custom modules
  source -F '#{d:current_file}/custom_modules/ctp_cpu.conf'
  source -F '#{d:current_file}/custom_modules/ctp_memory.conf'
  source -F '#{d:current_file}/custom_modules/ctp_network_ips.conf'

  set -g status-left '#{E:@catppuccin_status_session} '
  set -g status-right '#{E:@catppuccin_status_network_ips}'
  set -agF status-right '#{E:@catppuccin_status_ctp_cpu}'
  set -agF status-right '#{E:@catppuccin_status_ctp_memory}'
  if 'ls /sys/class/power_supply/BAT* >/dev/null 2>&1' {
    set -agF status-right '#{E:@catppuccin_status_battery}'
  }
  set -ag status-right '#{E:@catppuccin_status_date_time}'
} {
  set -g status-left '#S '
  set -g status-right '%d.%m. %H:%M'
}

# start index at 1
set -g base-index 1
set -g pane-base-index 1

# renumber when window is closed
set -g renumber-window on



# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '#{TMUX_PLUGIN_MANAGER_PATH}/tpm/tpm'
# initialize tmux plugin manager and source all plugins
# run '#{TMUX_PLUGIN_MANAGER_PATH}/tpm/tpm'

config:
  # Show when no definition is found.
  fallback-icon: "?"
  # Show when window has multiple panes (blank by default).
  multi-pane-icon: ""
  # Show the window name with the icon (defaults to false).
  show-name: true
  # Show the icon to the "left" or "right" of the window name (defaults to left).
  icon-position: "left"

icons:
  zsh: ""
  cmatrix: "🤯"
